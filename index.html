<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Padhle - Batches</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    header img {
      height: 36px;
    }

    header .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #7c3aed;
      letter-spacing: 1px;
    }

    main {
      max-width: 1300px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 480px) {
      main { padding: 0 12px; margin: 12px auto; }
      .grid { grid-template-columns: 1fr; gap: 14px; }
      header { padding: 10px 16px; }
      header img { height: 28px; }
    }

    @media (max-width: 700px) and (min-width: 481px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }

    @media (max-width: 1000px) and (min-width: 701px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .card-body {
      padding: 18px 20px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: #222;
      line-height: 1.4;
    }

    .card-price {
      font-size: 16px;
      color: #555;
      font-weight: 500;
    }

    .btn-view {
      margin-top: auto;
      padding: 13px 0;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .btn-view:hover {
      background: #6d28d9;
    }

    @media (max-width: 480px) {
      .card-body { padding: 12px 14px 14px; gap: 8px; }
      .card-title { font-size: 14px; }
      .card-price { font-size: 13px; }
      .btn-view { padding: 10px 0; font-size: 13px; }
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 16px;
      color: #888;
    }

    .error {
      text-align: center;
      padding: 60px;
      font-size: 16px;
      color: #e53e3e;
    }
  </style>
</head>
<body>

  <header>
    <img src="https://nocache-appxdb-v2.classx.co.in/subject/2025-03-27-0.4048302541291886.png" alt="Padhle Logo" />
  </header>

  <main>
    <div id="batches-container" class="loading">Loading batches...</div>
  </main>

  <script>
    const BASE_URL = 'https://apiserver-all.vercel.app/api/v1/padhle';

    async function fetchBatches() {
      const container = document.getElementById('batches-container');
      try {
        const res = await fetch('/api/proxy?url=' + encodeURIComponent(BASE_URL + '/batches'));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const batches = data.batches || [];

        if (!batches.length) {
          container.innerHTML = '<p class="error">No batches found.</p>';
          return;
        }

        container.className = 'grid';
        container.innerHTML = batches.map(batch => `
          <div class="card">
            <img
              src="${batch.thumbnail}"
              alt="${batch.course_name}"
              onerror="this.src='https://via.placeholder.com/400x225?text=No+Image'"
            />
            <div class="card-body">
              <div class="card-title">${batch.course_name}</div>
              <div class="card-price">Free</div>
              <button class="btn-view" onclick="viewBatch('${batch.id}', '${batch.course_name.replace(/'/g, "\\'")}')">View Content</button>
            </div>
          </div>
        `).join('');

      } catch (err) {
        container.className = 'error';
        container.innerHTML = `Failed to load batches: ${err.message}`;
        console.error(err);
      }
    }

    function viewBatch(id, title) {
      window.location.href = `batch.html?course_id=${id}&title=${encodeURIComponent(title)}`;
    }

    fetchBatches();
  </script>

</body>
</html>
