<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Batch Content</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f0f5; color: #333; }

    header { background: #fff; padding: 12px 28px; display: flex; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    header img { height: 36px; cursor: pointer; }

    .hero { background: #fff; padding: 22px 36px 0; }
    .hero h1 { font-size: 20px; font-weight: 800; text-transform: uppercase; color: #111; margin-bottom: 16px; }
    .tabs { display: flex; gap: 10px; padding-bottom: 16px; }
    .tab { padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: #ede9fe; color: #7c3aed; }
    .tab.active { background: #7c3aed; color: #fff; }

    .breadcrumb-bar { background: #f0f0f5; padding: 10px 36px; font-size: 13px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .breadcrumb-bar .crumb { color: #7c3aed; cursor: pointer; }
    .breadcrumb-bar .crumb:hover { text-decoration: underline; }
    .breadcrumb-bar .current { color: #555; }
    .breadcrumb-bar .sep { color: #aaa; }

    main { max-width: 1200px; margin: 20px auto; padding: 0 16px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      header img { height: 28px; }
      .hero { padding: 16px 16px 0; }
      .hero h1 { font-size: 15px; }
      .tabs { padding-bottom: 12px; }
      .tab { padding: 6px 14px; font-size: 12px; }
      .breadcrumb-bar { padding: 8px 14px; }
      .sub-tabs { padding: 10px 14px; }
      main { padding: 0 10px; margin: 12px auto; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .folder-card { padding: 18px 14px; }
      .folder-card .f-icon { width: 32px; height: 32px; }
      .folder-card .f-title { font-size: 13px; }
      .video-card .vbody { padding: 10px 12px 12px; }
      .video-card .vtitle { font-size: 13px; }
      .btn-watch, .btn-pdf { font-size: 13px; padding: 9px 0; }
    }
    @media (max-width: 700px) and (min-width: 481px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      main { padding: 0 14px; }
    }
    @media (max-width: 960px) and (min-width: 701px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s, transform 0.15s; }
    .card:hover { box-shadow: 0 4px 18px rgba(124,58,237,0.13); transform: translateY(-2px); }

    /* Folder */
    .folder-card { cursor: pointer; padding: 28px 20px; display: flex; align-items: center; gap: 16px; min-height: 90px; }
    .folder-card .f-icon { width: 42px; height: 42px; flex-shrink: 0; }
    .folder-card .f-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #1a1a1a; }

    /* Video */
    .video-card .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .video-card .vbody { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .video-card .vtitle { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
    .video-card .vmeta { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }

    /* PDF card */
    .pdf-card { cursor: pointer; padding: 24px 20px; display: flex; align-items: center; gap: 16px; min-height: 90px; }
    .pdf-card .p-icon { font-size: 36px; flex-shrink: 0; }
    .pdf-card .p-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }

    /* Link card */
    .link-card { cursor: pointer; padding: 24px 20px; display: flex; align-items: center; gap: 16px; min-height: 90px; }
    .link-card .l-icon { font-size: 32px; flex-shrink: 0; }
    .link-card .l-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }

    /* Image card */
    .image-card { cursor: pointer; overflow: hidden; }
    .image-card .img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 20px; min-height: 160px; background: #f5f0ff; }
    .image-card .img-loading { font-size: 36px; }
    .image-card .img-ititle { font-size: 13px; font-weight: 600; color: #555; text-align: center; }
    .image-card .img-full { width: 100%; display: block; object-fit: cover; }

    /* Image viewer modal */
    .img-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1200; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
    .img-overlay.show { display: flex; }
    .img-overlay img { max-width: 90vw; max-height: 85vh; border-radius: 8px; object-fit: contain; }
    .img-overlay .img-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

    .btn-watch { margin-top: 10px; padding: 10px 0; background: #7c3aed; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-watch:hover { background: #6d28d9; }
    .btn-pdf { margin-top: 6px; padding: 9px 0; background: #fff; color: #7c3aed; border: 2px solid #7c3aed; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-pdf:hover { background: #ede9fe; }

    .state-msg { grid-column: 1/-1; text-align: center; padding: 60px; font-size: 15px; color: #888; }
    .state-msg.err { color: #e53e3e; }

    /* Live sub-tabs */
    .sub-tabs { display: flex; gap: 10px; padding: 14px 36px; background: #f0f0f5; }
    .sub-tab { padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid #7c3aed; background: #fff; color: #7c3aed; }
    .sub-tab.active { background: #7c3aed; color: #fff; }

    /* Empty state */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty-state .tv-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: #aaa; }

    /* Quality Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #1a1a2e; border-radius: 14px; padding: 24px 20px; width: 340px; max-width: 95vw; position: relative; }
    .modal h2 { color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal .close-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
    .quality-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 13px 16px; margin-bottom: 10px; background: #6d28d9; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .quality-btn:hover { background: #7c3aed; }
    .quality-btn .q-left { display: flex; align-items: center; gap: 10px; }
    .modal-loading { color: #aaa; text-align: center; padding: 20px 0; font-size: 14px; }

    /* PDF Modal */
    .pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1100; align-items: center; justify-content: center; }
    .pdf-overlay.show { display: flex; }
    .pdf-modal { background: #fff; border-radius: 12px; width: 92vw; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .pdf-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #e5e5e5; font-size: 15px; font-weight: 600; color: #222; }
    .pdf-header button { background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
    #pdf-frame { flex: 1; width: 100%; border: none; }
  </style>
</head>
<body>

<header>
  <img src="https://nocache-appxdb-v2.classx.co.in/subject/2025-03-27-0.4048302541291886.png"
       alt="Padhle" onclick="window.location.href='index.html'"/>
</header>

<div class="hero">
  <h1 id="batch-title">Loading...</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('content')">Content</button>
    <button class="tab" onclick="switchTab('live')">Live &amp; Upcoming</button>
  </div>
</div>

<div class="breadcrumb-bar" id="breadcrumb"></div>
<div class="sub-tabs" id="sub-tabs" style="display:none">
  <button class="sub-tab active" onclick="switchLiveTab('live')">Live &amp; Upcoming</button>
  <button class="sub-tab" onclick="switchLiveTab('previous')">Previous Live Videos</button>
</div>

<!-- Quality Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2>Select Video Quality</h2>
    <div id="modal-body"><div class="modal-loading">Loading...</div></div>
  </div>
</div>

<!-- PDF Modal -->
<div class="pdf-overlay" id="pdf-overlay">
  <div class="pdf-modal">
    <div class="pdf-header">
      <span id="pdf-title">PDF Viewer</span>
      <button onclick="closePdf()">✕</button>
    </div>
    <iframe id="pdf-frame" src="" frameborder="0"></iframe>
  </div>
</div>

<!-- Image Viewer Modal -->
<div class="img-overlay" id="img-overlay" onclick="closeImage()">
  <button class="img-close" onclick="closeImage()">✕</button>
  <img id="img-viewer-src" src="" alt="Image"/>
</div>

<main>
  <div class="grid" id="grid">
    <div class="state-msg">Loading content...</div>
  </div>
</main>

<script>
  // ── Config ──────────────────────────────────────────────
  const PROXY       = '';
  const BASE        = 'https://apiserver-henna.vercel.app';
  const OLD_BASE    = 'https://apiserver-all.vercel.app/api/v1/padhle';
  const FOLDER_ICON = 'https://www.vibrantacademy.com/icons/folder.svg';
  const COURSE_82   = '82';
  const DECRYPT_KEY = '638udh3829162018';

  const params    = new URLSearchParams(window.location.search);
  const courseId  = params.get('course_id');
  const batchName = decodeURIComponent(params.get('title') || 'Batch Content');

  // Use new API for all batches
  const useNewApi = true;

  let stack = [];

  document.getElementById('batch-title').textContent = batchName.toUpperCase();

  // ── AES-128-CBC Decrypt (Browser SubtleCrypto) ──────────
  async function decode(link) {
    if (!link) return null;
    const s = String(link).trim();
    if (s.startsWith('http')) return s;
    const colonIdx = s.indexOf(':');
    if (colonIdx === -1) return null;
    try {
      const encPart = s.substring(0, colonIdx);
      const ivB64   = s.substring(colonIdx + 1);
      const ivStr   = atob(ivB64).replace(/\0/g, '').trim(); // 16 chars
      const keyBytes = new TextEncoder().encode(DECRYPT_KEY);
      const ivBytes  = new TextEncoder().encode(ivStr);
      const encBytes = Uint8Array.from(atob(encPart), c => c.charCodeAt(0));
      const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-CBC' }, false, ['decrypt']);
      const decBuf = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: ivBytes }, cryptoKey, encBytes);
      const result = new TextDecoder().decode(decBuf).replace(/\0/g, '').trim();
      return result.startsWith('http') ? result : null;
    } catch { return null; }
  }

  function playerUrl(hlsUrl) {
    return `https://appx-play.akamai.net.in/video-player?url=${encodeURIComponent(hlsUrl)}`;
  }

  function pdfViewerUrl(pdfUrl) {
    return `https://pdfweb.classx.co.in/pdfjs/web/viewer-new.html?file=${encodeURIComponent(pdfUrl)}`;
  }

  async function apiFetch(url) {
    const res = await fetch('/api/proxy?url=' + encodeURIComponent(url));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── Tab switch ───────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'content') || (i === 1 && tab === 'live'));
    });
    const subTabs = document.getElementById('sub-tabs');
    const bc = document.getElementById('breadcrumb');
    if (tab === 'content') {
      subTabs.style.display = 'none';
      bc.style.display = 'flex';
      stack = [];
      renderBreadcrumb();
      loadContent(null);
    } else {
      subTabs.style.display = 'flex';
      bc.style.display = 'none';
      // reset sub-tab to live
      document.querySelectorAll('.sub-tab').forEach((t,i) => t.classList.toggle('active', i===0));
      loadLive('live');
    }
  }

  function switchLiveTab(type) {
    document.querySelectorAll('.sub-tab').forEach((t,i) => {
      t.classList.toggle('active', (i===0 && type==='live') || (i===1 && type==='previous'));
    });
    loadLive(type);
  }

  // ── Content loading ──────────────────────────────────────
  async function loadContent(parentId) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="state-msg">Loading...</div>';

    try {
      const pid = parentId || '-1';
      const data = await apiFetch(`${BASE}/api/padhle/content?course_id=${courseId}&parent_id=${pid}`);
      let items = data.data || [];

      // auto-drill single Home FOLDER at root
      if (!parentId && items.length === 1 && items[0].material_type === 'FOLDER') {
        const home = items[0];
        stack = [{ id: home.id, title: home.Title }];
        renderBreadcrumb();
        await loadContent(home.id);
        return;
      }

      renderGrid(items);
    } catch (e) {
      grid.innerHTML = `<div class="state-msg err">Failed to load: ${e.message}</div>`;
    }
  }

  // ── Render grid ──────────────────────────────────────────
  function renderGrid(items) {
    const grid = document.getElementById('grid');
    if (!items.length) { grid.innerHTML = '<div class="state-msg">No content here.</div>'; return; }
    grid.innerHTML = items.map(item => renderNewApiItem(item)).join('');
  }

  function renderNewApiItem(item) {
    const type = item.material_type;
    const title = item.Title || '';
    const id = item.id;

    if (type === 'FOLDER') {
      return `<div class="card folder-card" onclick="openFolder('${id}','${esc(title)}')">
        <img class="f-icon" src="${FOLDER_ICON}" alt="folder"/>
        <div class="f-title">${title}</div>
      </div>`;
    }

    if (type === 'PDF') {
      return `<div class="card pdf-card" onclick="openPdfItem('${esc(item.pdf_link)}','${esc(title)}')">
        <div class="p-icon">📄</div>
        <div class="p-title">${title}</div>
      </div>`;
    }

    if (type === 'IMAGE') {
      const imgUrl = item.thumbnail || '';
      if (!imgUrl) return '';
      return `<div class="card image-card" onclick="openImageDirect('${esc(imgUrl)}','${esc(title)}')">
        <img class="img-full" src="${imgUrl}" alt="${esc(title)}"
             onerror="this.parentElement.style.display='none'"/>
      </div>`;
    }

    if (type === 'LINK') {
      const encLink = item.file_link || item.download_link || '';
      return `<div class="card link-card" onclick="openLinkItem('${esc(encLink)}')">
        <div class="l-icon">🔗</div>
        <div class="l-title">${title}</div>
      </div>`;
    }

    if (type === 'VIDEO') {
      const thumb = item.thumbnail || 'https://via.placeholder.com/400x225?text=Video';
      const dur   = item.duration || '';
      const hasPdf = !!(item.pdf_link);
      return `<div class="card video-card">
        <img class="thumb" src="${thumb}" alt="${esc(title)}"
             onerror="this.src='https://via.placeholder.com/400x225?text=Video'"/>
        <div class="vbody">
          <div class="vtitle">${title}</div>
          ${dur ? `<div class="vmeta">🕐 ${dur}</div>` : ''}
          <button class="btn-watch" onclick="watchNewVideo('${id}','${courseId}')">Watch</button>
          ${hasPdf ? `<button class="btn-pdf" onclick="openPdfItem('${esc(item.pdf_link)}','${esc(title)}')">📄 View PDF</button>` : ''}
        </div>
      </div>`;
    }

    return '';
  }

  function renderOldApiItem(item) {
    if (item.type === 'folder') {
      return `<div class="card folder-card" onclick="openFolder('${item.id}','${esc(item.title)}')">
        <img class="f-icon" src="${FOLDER_ICON}" alt="folder"/>
        <div class="f-title">${item.title}</div>
      </div>`;
    }
    const thumb = item.thumbnail || 'https://via.placeholder.com/400x225?text=Video';
    const created = item.created_at ? fmtDate(item.created_at) : '';
    const dur = item.duration ? fmtDur(item.duration) : '';
    return `<div class="card video-card">
      <img class="thumb" src="${thumb}" alt="${esc(item.title)}"
           onerror="this.src='https://via.placeholder.com/400x225?text=Video'"/>
      <div class="vbody">
        <div class="vtitle">${item.title}</div>
        ${created ? `<div class="vmeta">📅 ${created}</div>` : ''}
        ${dur ? `<div class="vmeta">🕐 ${dur}</div>` : ''}
        <button class="btn-watch" onclick="watchOldVideo('${item.id}','${courseId}')">Watch</button>
      </div>
    </div>`;
  }

  // ── Watch video (new API - all batches) ─────────────────
  async function watchNewVideo(videoId, courseId) {
    showModal('<div class="modal-loading">Loading qualities...</div>');
    try {
      const data = await apiFetch(`${BASE}/api/padhle/video-details?video_id=${videoId}&course_id=${courseId}`);
      const v = data.data || {};

      // Priority: download_links → encrypted_links → file_link
      let links = [];

      if (Array.isArray(v.download_links) && v.download_links.length) {
        links = v.download_links.map(q => ({ quality: q.quality || q.bitrate, path: q.path }));
      } else if (Array.isArray(v.encrypted_links) && v.encrypted_links.length) {
        links = v.encrypted_links.map(q => ({ quality: q.quality, path: q.path }));
      } else if (Array.isArray(v.livestream_links) && v.livestream_links.length) {
        links = v.livestream_links.map(q => ({ quality: q.quality, path: q.path }));
      }

      if (!links.length) {
        // fallback to file_link
        const hlsUrl = await decode(v.file_link);
        if (hlsUrl) { window.open(playerUrl(hlsUrl), '_blank'); closeModal(); return; }
        document.getElementById('modal-body').innerHTML = '<div class="modal-loading">No qualities available.</div>';
        return;
      }

      const btns = await Promise.all(links.map(async q => {
        const hls = await decode(q.path);
        if (!hls) return '';
        const pUrl = playerUrl(hls);
        return `<button class="quality-btn" onclick="window.open('${esc(pUrl)}','_blank');closeModal()">
          <div class="q-left"><span>🎬</span><span>${q.quality}</span></div><span>›</span>
        </button>`;
      }));

      const html = btns.filter(Boolean).join('');
      document.getElementById('modal-body').innerHTML = html || '<div class="modal-loading">Could not decode links.</div>';
    } catch (e) {
      document.getElementById('modal-body').innerHTML = `<div class="modal-loading" style="color:#f87171">Error: ${e.message}</div>`;
    }
  }

  // ── Watch video (old API) ────────────────────────────────
  async function watchOldVideo(videoId, courseId) {
    showModal('<div class="modal-loading">Loading qualities...</div>');
    try {
      const url  = `${OLD_BASE}/video?video_id=${videoId}&course_id=${courseId}`;
      const data = await apiFetch(url);
      const qualities = data.qualities || [];
      if (!qualities.length) { document.getElementById('modal-body').innerHTML = '<div class="modal-loading">No qualities.</div>'; return; }
      document.getElementById('modal-body').innerHTML = qualities.map(q => `
        <button class="quality-btn" onclick="window.open('${esc(q.player_url)}','_blank');closeModal()">
          <div class="q-left"><span>🎬</span><span>${q.quality}</span></div><span>›</span>
        </button>`).join('');
    } catch (e) {
      document.getElementById('modal-body').innerHTML = `<div class="modal-loading" style="color:#f87171">Error: ${e.message}</div>`;
    }
  }

  // ── PDF open ─────────────────────────────────────────────
  async function openPdfItem(encLink, title) {
    const raw = decodeURIComponent(encLink);
    let pdfUrl = await decode(raw);
    if (!pdfUrl) { alert('Could not decode PDF link.'); return; }
    const viewerUrl = pdfViewerUrl(pdfUrl);
    document.getElementById('pdf-title').textContent = decodeURIComponent(title) || 'PDF Viewer';
    document.getElementById('pdf-frame').src = viewerUrl;
    document.getElementById('pdf-overlay').classList.add('show');
  }

  function closePdf() {
    document.getElementById('pdf-overlay').classList.remove('show');
    document.getElementById('pdf-frame').src = '';
  }

  // ── Image open ───────────────────────────────────────────
  function openImageDirect(imgUrl, title) {
    document.getElementById('img-viewer-src').src = decodeURIComponent(imgUrl);
    document.getElementById('img-overlay').classList.add('show');
  }

  function closeImage() {
    document.getElementById('img-overlay').classList.remove('show');
    document.getElementById('img-viewer-src').src = '';
  }

  // ── Link open ────────────────────────────────────────────
  async function openLinkItem(encLink) {
    const raw = decodeURIComponent(encLink);
    const url = await decode(raw);
    if (!url) { alert('Could not decode link.'); return; }
    window.open(url, '_blank');
  }

  // ── Live tab ─────────────────────────────────────────────
  async function loadLive(type = 'live') {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="state-msg">Loading...</div>';

    try {
      let items = [];
      if (type === 'previous') {
        const data = await apiFetch(`${BASE}/api/padhle/previous-live?course_id=${courseId}`);
        items = Array.isArray(data.data) ? data.data : [];
      } else {
        const [liveRes, upcomingRes] = await Promise.all([
          apiFetch(`${BASE}/api/padhle/live?course_id=${courseId}&live_status=1`),
          apiFetch(`${BASE}/api/padhle/live?course_id=${courseId}&live_status=2`)
        ]);
        const liveItems     = Array.isArray(liveRes.data)     ? liveRes.data     : [];
        const upcomingItems = Array.isArray(upcomingRes.data) ? upcomingRes.data : [];
        items = [...liveItems, ...upcomingItems];
      }

      if (!items.length) {
        grid.innerHTML = `<div class="empty-state">
          <div class="tv-icon">📺</div>
          <h3>No Live Videos</h3>
          <p>${type === 'live' ? 'There are no live classes scheduled at the moment.' : 'No previous live videos found.'}</p>
        </div>`;
        return;
      }

      grid.innerHTML = items.map(item => {
        const thumb = item.thumbnail || 'https://via.placeholder.com/400x225?text=Live';
        const hasPdf = !!(item.pdf_link);
        const hasVideo = !!(item.video_player_url);
        return `<div class="card video-card">
          <img class="thumb" src="${thumb}" alt="${esc(item.Title)}"
               onerror="this.src='https://via.placeholder.com/400x225?text=Live'"/>
          <div class="vbody">
            <div class="vtitle">${item.Title || ''}</div>
            ${item.date_and_time ? `<div class="vmeta">📅 Created on: ${item.date_and_time}</div>` : ''}
            ${item.duration ? `<div class="vmeta">🕐 ${item.duration}</div>` : ''}
            ${hasVideo ? `<button class="btn-watch" onclick="window.open('${esc(item.video_player_url)}','_blank')">Watch</button>` : ''}
            ${hasPdf ? `<button class="btn-pdf" onclick="openPdfItem('${esc(item.pdf_link)}','${esc(item.Title)}')">📄 View PDF</button>` : ''}
          </div>
        </div>`;
      }).join('');
    } catch (e) {
      grid.innerHTML = `<div class="state-msg err">Failed: ${e.message}</div>`;
    }
  }

  // ── Folder nav ───────────────────────────────────────────
  function openFolder(id, title) {
    stack.push({ id, title: decodeURIComponent(title) });
    renderBreadcrumb();
    loadContent(id);
  }

  function renderBreadcrumb() {
    const bc    = document.getElementById('breadcrumb');
    const parts = [{ id: null, title: batchName }, ...stack];
    bc.innerHTML = parts.map((p, i) => {
      const isLast = i === parts.length - 1;
      const sep    = isLast ? '' : '<span class="sep"> › </span>';
      if (isLast) return `<span class="current">${p.title}</span>`;
      return `<span class="crumb" onclick="jumpTo(${i})">${p.title}</span>${sep}`;
    }).join('');
  }

  function jumpTo(index) {
    if (index === 0) { stack = []; renderBreadcrumb(); loadContent(null); }
    else { stack = stack.slice(0, index); renderBreadcrumb(); loadContent(stack[stack.length - 1].id); }
  }

  // ── Modal helpers ────────────────────────────────────────
  function showModal(html) {
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
  function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

  // ── Utils ────────────────────────────────────────────────
  function fmtDate(str) {
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }
  function fmtDur(secs) { const m = Math.floor(secs/60), s = secs%60; return `${m} mins ${s} secs`; }
  function esc(str) { return (str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  // ── Init ─────────────────────────────────────────────────
  if (courseId) { renderBreadcrumb(); loadContent(null); }
  else { document.getElementById('grid').innerHTML = '<div class="state-msg err">No batch selected.</div>'; }
</script>
</body>
</html>
